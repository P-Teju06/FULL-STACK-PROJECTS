# Server (8080 matches the usual localhost URL; override with SERVER_PORT env if needed)
server.port=${SERVER_PORT:8082}

# H2 Database
spring.datasource.url=jdbc:h2:mem:jobportaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File Storage Path
app.upload.dir=uploads/resumes

# ── Gmail SMTP — outbound mail uses YOUR account; candidates receive mail at their typed email ──
# Create an App Password: Google Account → Security → 2-Step Verification → App passwords.
# Prefer env vars (never commit real passwords):
#   set MAIL_USERNAME=you@gmail.com
#   set MAIL_APP_PASSWORD=xxxx xxxx xxxx xxxx
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:bravopt06@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:arxsthkbfkwbylfw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Optional: footer name in outbound emails
app.mail.sender.name=Job Portal Careers
# Log full email text to the server console when SMTP is missing or fails (set false to disable).
app.mail.log-to-console=true

# Thymeleaf
spring.thymeleaf.cache=false

# Logging
logging.level.com.jobportal=INFO
